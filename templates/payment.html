{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="card border-0 shadow p-5 rounded-4">

        <h1 class="fw-bold mb-4">
            💳 Payment
        </h1>

        <h3 class="mb-4">
            Total Amount:
            <span class="text-danger">
                ₹{{ final_total }}
            </span>
        </h3>

        <div class="mb-4">

            <h5>Select Payment Method</h5>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       checked>
                <label class="form-check-label">
                    Cash On Delivery
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio">
                <label class="form-check-label">
                    UPI
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio">
                <label class="form-check-label">
                    Credit / Debit Card
                </label>
            </div>

        </div>

        <form method="POST">
            {% csrf_token %}

            <button type="submit"
                    class="btn btn-danger btn-lg">
                Place Order
            </button>
        </form>

    </div>

</div>

{% endblock %}
